name: Publish Helm Chart

on:
  push:
    branches:
      - master
    paths:
      - charts/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Login to GHCR
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io \
          --username ${{ github.actor }} \
          --password-stdin

      - name: Package chart
        run: helm package charts/kubernetes-zerotier-bridge

      - name: Push chart
        run: |
          CHART_VERSION=$(grep '^version:' charts/kubernetes-zerotier-bridge/Chart.yaml | awk '{print $2}')
          helm push kubernetes-zerotier-bridge-${CHART_VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
