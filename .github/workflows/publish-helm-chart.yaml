name: Publish Helm Chart

on:
  push:
    branches:
      - master
    paths:
      - charts/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4
        with:
          version: latest

      - name: Login to registry
        uses: docker/login-action@v3
        with:
            registry: ghcr.io
            username: ${{ github.actor }}
            password: ${{ secrets.GITHUB_TOKEN }}

      - name: Package chart
        run: |
              helm package charts/kubernetes-zerotier-bridge

      - name: Push chart
        run: |
          CHART_VERSION=$(grep '^version:' charts/kubernetes-zerotier-bridge/Chart.yaml | awk '{print $2}')
          helm push kubernetes-zerotier-bridge-${CHART_VERSION}.tgz oci://ghcr.io/${{ github.repository_owner }}/charts
